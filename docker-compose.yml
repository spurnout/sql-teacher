services:
  postgres:
    image: postgres:16-alpine
    container_name: sql-teacher-db
    environment:
      POSTGRES_DB: sql_teacher
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sql_teacher"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build: .
    container_name: sql-teacher-app
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://sandbox_user:sandbox_password@postgres:5432/sql_teacher
      DATABASE_ADMIN_URL: postgres://admin:admin_password@postgres:5432/sql_teacher
      NEXT_PUBLIC_APP_URL: http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
